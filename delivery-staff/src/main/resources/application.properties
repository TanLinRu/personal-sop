spring.application.name=delivery-staff
server.port=8080

# H2 Database
spring.datasource.url=jdbc:h2:mem:deliverydb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# JPA ddl-auto: none (MyBatis-Plus manages schema via H2 init SQL)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# MyBatis-Plus
mybatis-plus.mapper-locations=classpath*:/mapper/**/*.xml
mybatis-plus.type-aliases-package=com.delivery.staff.entity
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# H2 initialization
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.jpa.defer-datasource-initialization=true

# Jackson
spring.jackson.serialization.indent-output=true
spring.jackson.deserialization.fail-on-null-for-primitives=false