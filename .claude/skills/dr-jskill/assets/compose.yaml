# Docker Compose file for Spring Boot development
# Place this file in your project root for automatic MySQL startup
# with spring-boot-docker-compose

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mydb
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: