sop: backend-iteration
version: 1.0.0
metadata:
  description: Backend-only development iteration workflow
  author: SOP Team
  updated: 2026-06-09

expected_steps:
  - id: 1_confirm
    name: 需求确认
    type: confirm
    required: true
  - id: 2_research
    name: 技术调研
    type: auto
    required: false
  - id: 3_prd
    name: PRD 生成
    type: auto
    required: true
  - id: 4_arch
    name: 架构设计
    type: auto
    required: true
  - id: 5_review
    name: 架构审核
    type: confirm
    required: true
  - id: 6_dependency
    name: 依赖分析
    type: auto
    required: true
  - id: 7_implement
    name: 编码实现
    type: auto
    required: true
    produces: ["src/main/java/**/*.java"]
  - id: 8_verify
    name: 验证
    type: auto
    required: true
  - id: 9_knowledge
    name: 知识沉淀
    type: auto
    required: false

expected_params:
  - name: feature_description
    description: 功能描述
    type: string
    required: true
    source: user_input
    used_in_steps: [1_confirm, 3_prd, 4_arch, 7_implement]

expected_outputs:
  - path: "src/main/java/**/*.java"
    description: Java 源代码
    type: code
    required: true
    validate: [not_empty]
    tags: [code]
  - path: "src/main/resources/**/*.xml"
    description: MyBatis XML 映射
    type: code
    required: false
    validate: [not_empty]
    tags: [code]
  - path: "src/test/java/**/*Test*.java"
    description: 测试代码
    type: code
    required: true
    validate: [not_empty]
    tags: [test]

constraints:
  strict_order: true
  allow_skip: false
  allow_parallel: false
